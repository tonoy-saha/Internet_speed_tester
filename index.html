<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pulse — Connection Speed Check</title>
<meta name="description" content="Pulse is a free, browser-based internet speed test that measures ping, download, and upload speed in real time.">
<meta property="og:title" content="Pulse — Internet Speed Test">
<meta property="og:description" content="Free real-time speed test for ping, download, and upload.">
<link rel="canonical" href="https://internet-speed-tester-alpha.vercel.app/">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy: #0D1321;
    --panel: #16223A;
    --panel-2: #1D2D44;
    --amber: #F0A202;
    --cyan: #4CC9F0;
    --coral: #EF6461;
    --ink: #E8E9EB;
    --ink-dim: #8C97AD;
    --line: rgba(232,233,235,0.09);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background: radial-gradient(1200px 600px at 50% -10%, #17233d 0%, var(--navy) 55%);
    color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 32px 16px;
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
  .app{
    width:100%;
    max-width: 620px;
  }
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  h1{
    font-family:'Space Grotesk', sans-serif;
    font-weight: 700;
    font-size: 28px;
    margin: 0 0 4px 0;
    letter-spacing: -0.01em;
  }
  .sub{
    color: var(--ink-dim);
    font-size: 14px;
    margin: 0 0 28px 0;
  }
  .panel{
    background: linear-gradient(180deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 28px;
    position: relative;
    overflow: hidden;
  }
  .stages{
    display:flex;
    gap: 6px;
    margin-bottom: 22px;
  }
  .stage{
    flex:1;
    text-align:center;
    padding: 8px 4px;
    border-radius: 8px;
    font-family:'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-dim);
    border: 1px solid var(--line);
    transition: all 0.3s ease;
  }
  .stage.active{
    color: var(--navy);
    background: var(--amber);
    border-color: var(--amber);
  }
  .stage.done{
    color: var(--cyan);
    border-color: rgba(76,201,240,0.4);
    background: rgba(76,201,240,0.07);
  }
  .hero{
    text-align:center;
    padding: 18px 0 8px 0;
  }
  .phase-label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-dim);
    min-height: 18px;
  }
  .big-number{
    font-family:'IBM Plex Mono', monospace;
    font-variant-numeric: tabular-nums;
    font-size: 68px;
    font-weight: 600;
    line-height: 1;
    margin: 10px 0 2px 0;
    color: var(--ink);
  }
  .unit{
    font-family:'IBM Plex Mono', monospace;
    font-size: 15px;
    color: var(--ink-dim);
    letter-spacing: 0.05em;
  }
  canvas#wave{
    width: 100%;
    height: 90px;
    display:block;
    margin: 18px 0 4px 0;
  }
  .controls{
    display:flex;
    justify-content:center;
    margin: 18px 0 6px 0;
  }
  button#startBtn{
    font-family:'Space Grotesk', sans-serif;
    font-weight: 600;
    font-size: 15px;
    color: var(--navy);
    background: var(--amber);
    border: none;
    border-radius: 999px;
    padding: 13px 34px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 0 0 0 rgba(240,162,2,0.5);
  }
  button#startBtn:hover{ transform: translateY(-1px); box-shadow: 0 6px 18px rgba(240,162,2,0.25); }
  button#startBtn:active{ transform: translateY(0); }
  button#startBtn:focus-visible{ outline: 2px solid var(--cyan); outline-offset: 3px; }
  button#startBtn:disabled{ opacity: 0.45; cursor: default; transform:none; box-shadow:none; }

  .results{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-top: 24px;
    opacity: 0;
    max-height: 0;
    overflow: hidden;
    transition: opacity 0.4s ease;
  }
  .results.show{ opacity: 1; max-height: 300px; margin-top:24px; }
  .stat{
    background: rgba(232,233,235,0.03);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 14px 10px;
    text-align:center;
  }
  .stat .label{
    font-family:'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 6px;
  }
  .stat .value{
    font-family:'IBM Plex Mono', monospace;
    font-variant-numeric: tabular-nums;
    font-size: 21px;
    font-weight: 600;
  }
  .stat .value.dl{ color: var(--cyan); }
  .stat .value.ul{ color: var(--coral); }
  .stat .value.pg{ color: var(--amber); }
  .quality{
    text-align:center;
    font-family:'IBM Plex Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: var(--ink-dim);
    margin-top: 16px;
    min-height: 16px;
  }
  .quality b{ color: var(--ink); }
  footer{
    text-align:center;
    color: var(--ink-dim);
    font-size: 12px;
    margin-top: 18px;
    line-height: 1.6;
  }
  footer a{ color: var(--ink-dim); }
</style>
</head>
<body>
<div class="app">
  <div class="eyebrow">Network Diagnostic</div>
  <h1>Pulse</h1>
  <p class="sub">A real-time read on your connection — ping, download, and upload, measured live.</p>

  <div class="panel">
    <div class="stages">
      <div class="stage" id="stage-ping">Ping</div>
      <div class="stage" id="stage-download">Download</div>
      <div class="stage" id="stage-upload">Upload</div>
    </div>

    <div class="hero">
      <div class="phase-label" id="phaseLabel">Ready when you are</div>
      <div class="big-number" id="bigNumber">--</div>
      <div class="unit" id="unitLabel">Mbps</div>
    </div>

    <canvas id="wave" width="600" height="90"></canvas>

    <div class="controls">
      <button id="startBtn">Start Test</button>
    </div>

    <div class="results" id="results">
      <div class="stat">
        <div class="label">Ping</div>
        <div class="value pg" id="resPing">--</div>
      </div>
      <div class="stat">
        <div class="label">Download</div>
        <div class="value dl" id="resDown">--</div>
      </div>
      <div class="stat">
        <div class="label">Upload</div>
        <div class="value ul" id="resUp">--</div>
      </div>
    </div>

    <div class="quality" id="quality"></div>
  </div>

  <footer>
    © 2026 Internet Speed Tester. Developed by Tonoy Saha. All Rights Reserved.
  </footer>
</div>

<script>
(function(){
  const BASE = 'https://speed.cloudflare.com';
  const canvas = document.getElementById('wave');
  const ctx = canvas.getContext('2d');
  const phaseLabel = document.getElementById('phaseLabel');
  const bigNumber = document.getElementById('bigNumber');
  const unitLabel = document.getElementById('unitLabel');
  const startBtn = document.getElementById('startBtn');
  const results = document.getElementById('results');
  const qualityEl = document.getElementById('quality');
  const stageEls = {
    ping: document.getElementById('stage-ping'),
    download: document.getElementById('stage-download'),
    upload: document.getElementById('stage-upload')
  };

  function resizeCanvas(){
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width * devicePixelRatio;
    canvas.height = rect.height * devicePixelRatio;
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  }
  window.addEventListener('resize', resizeCanvas);

  let waveColor = '#4CC9F0';

  function drawWaveform(samples){
    const rect = canvas.getBoundingClientRect();
    const w = rect.width, h = rect.height;
    ctx.clearRect(0,0,w,h);
    if(samples.length < 2) return;
    const max = Math.max(...samples, 1);
    const step = w / (samples.length - 1);

    ctx.beginPath();
    samples.forEach((v, i) => {
      const x = i * step;
      const y = h - (v / max) * (h - 8) - 4;
      if(i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    });
    ctx.strokeStyle = waveColor;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.shadowColor = waveColor;
    ctx.shadowBlur = 6;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // baseline
    ctx.beginPath();
    ctx.moveTo(0, h - 1);
    ctx.lineTo(w, h - 1);
    ctx.strokeStyle = 'rgba(232,233,235,0.08)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }

  function setStage(name){
    Object.keys(stageEls).forEach(k => stageEls[k].classList.remove('active'));
    if(name) stageEls[name].classList.add('active');
  }
  function markDone(name){
    stageEls[name].classList.remove('active');
    stageEls[name].classList.add('done');
  }

  function fmt(n, d=1){
    if(!isFinite(n)) return '--';
    return n.toFixed(d);
  }

  function mean(arr){ return arr.reduce((a,b)=>a+b,0) / arr.length; }
  function stdev(arr){
    const m = mean(arr);
    return Math.sqrt(mean(arr.map(v => (v-m)**2)));
  }

  // ---------- PING ----------
  async function runPing(){
    setStage('ping');
    phaseLabel.textContent = 'Measuring ping';
    unitLabel.textContent = 'ms';
    waveColor = '#F0A202';
    const samples = [];
    const rounds = 7;
    for(let i=0;i<rounds;i++){
      const t0 = performance.now();
      try{
        await fetch(`${BASE}/__down?bytes=0&x=${Math.random()}`, { cache: 'no-store' });
      }catch(e){ /* ignore single failure */ }
      const t1 = performance.now();
      const latency = t1 - t0;
      if(i > 0){ // discard first (warm-up / connection setup)
        samples.push(latency);
        bigNumber.textContent = fmt(latency, 0);
        drawWaveform(samples);
      }
    }
    markDone('ping');
    const avg = mean(samples);
    const jitter = stdev(samples);
    return { avg, jitter };
  }

  // ---------- DOWNLOAD ----------
  async function downloadOneStream(bytes, signal, onChunk){
    try{
      const res = await fetch(`${BASE}/__down?bytes=${bytes}&x=${Math.random()}`, { signal, cache: 'no-store' });
      const reader = res.body.getReader();
      while(true){
        const { done, value } = await reader.read();
        if(done) break;
        onChunk(value.length);
      }
    }catch(e){ /* aborted or failed, ignore */ }
  }

  async function runDownload(){
    setStage('download');
    phaseLabel.textContent = 'Measuring download';
    unitLabel.textContent = 'Mbps';
    waveColor = '#4CC9F0';
    const streams = 4;
    const bytesPerStream = 26_000_000;
    const maxDuration = 12000;
    let total = 0;
    const samples = [];
    const start = performance.now();
    const controller = new AbortController();
    const abortTimer = setTimeout(() => controller.abort(), maxDuration);

    const sampleTimer = setInterval(() => {
      const elapsed = (performance.now() - start) / 1000;
      const mbps = (total * 8 / 1e6) / elapsed;
      samples.push(mbps);
      bigNumber.textContent = fmt(mbps);
      drawWaveform(samples);
    }, 200);

    const tasks = Array.from({ length: streams }, () =>
      downloadOneStream(bytesPerStream, controller.signal, (len) => { total += len; })
    );
    await Promise.allSettled(tasks);

    clearInterval(sampleTimer);
    clearTimeout(abortTimer);
    markDone('download');
    const elapsed = (performance.now() - start) / 1000;
    return (total * 8 / 1e6) / elapsed;
  }

  // ---------- UPLOAD ----------
  function uploadOneStream(blob, signal, onDelta){
    return new Promise((resolve) => {
      const xhr = new XMLHttpRequest();
      let prevLoaded = 0;
      xhr.open('POST', `${BASE}/__up`);
      xhr.upload.onprogress = (e) => {
        const delta = e.loaded - prevLoaded;
        prevLoaded = e.loaded;
        onDelta(delta);
      };
      xhr.onloadend = () => resolve();
      xhr.onerror = () => resolve();
      if(signal){
        signal.addEventListener('abort', () => { try{ xhr.abort(); }catch(e){} });
      }
      xhr.send(blob);
    });
  }

  async function runUpload(){
    setStage('upload');
    phaseLabel.textContent = 'Measuring upload';
    unitLabel.textContent = 'Mbps';
    waveColor = '#EF6461';
    const streams = 3;
    const bytesPerStream = 18_000_000;
    const maxDuration = 12000;
    const blob = new Blob([new Uint8Array(bytesPerStream)]);
    let total = 0;
    const samples = [];
    const start = performance.now();
    const controller = new AbortController();
    const abortTimer = setTimeout(() => controller.abort(), maxDuration);

    const sampleTimer = setInterval(() => {
      const elapsed = (performance.now() - start) / 1000;
      const mbps = (total * 8 / 1e6) / elapsed;
      samples.push(mbps);
      bigNumber.textContent = fmt(mbps);
      drawWaveform(samples);
    }, 200);

    const tasks = Array.from({ length: streams }, () =>
      uploadOneStream(blob, controller.signal, (len) => { total += len; })
    );
    await Promise.allSettled(tasks);

    clearInterval(sampleTimer);
    clearTimeout(abortTimer);
    markDone('upload');
    const elapsed = (performance.now() - start) / 1000;
    return (total * 8 / 1e6) / elapsed;
  }

  function qualityLabel(download){
    if(download >= 100) return 'Excellent — built for 4K streaming and video calls';
    if(download >= 25) return 'Good — comfortable for HD streaming and remote work';
    if(download >= 5) return 'Fair — fine for browsing, may strain with multiple devices';
    return 'Slow — expect buffering on video and large downloads';
  }

  async function runFullTest(){
    startBtn.disabled = true;
    startBtn.textContent = 'Testing…';
    results.classList.remove('show');
    qualityEl.textContent = '';
    Object.values(stageEls).forEach(el => el.classList.remove('done','active'));

    try{
      const ping = await runPing();
      const download = await runDownload();
      const upload = await runUpload();

      phaseLabel.textContent = 'Done';
      bigNumber.textContent = fmt(download);
      unitLabel.textContent = 'Mbps down';

      document.getElementById('resPing').textContent = `${fmt(ping.avg, 0)} ms`;
      document.getElementById('resDown').textContent = `${fmt(download)} Mbps`;
      document.getElementById('resUp').textContent = `${fmt(upload)} Mbps`;
      results.classList.add('show');
      qualityEl.innerHTML = qualityLabel(download);
    }catch(err){
      phaseLabel.textContent = 'Test failed — check your connection and try again';
      bigNumber.textContent = '--';
    }finally{
      startBtn.disabled = false;
      startBtn.textContent = 'Run Again';
    }
  }

  startBtn.addEventListener('click', runFullTest);
  resizeCanvas();
})();
</script>
</body>
</html>
